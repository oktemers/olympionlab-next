<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Başvurun Alındı | Olympion</title>
  <meta name="description" content="Olympion mentörlük başvurusu alındı." />
  <meta name="robots" content="noindex, nofollow" />

  <link rel="stylesheet" href="/style.css" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

  <style>
    body {
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 18% 18%, rgba(124, 242, 255, 0.15), transparent 34%),
        radial-gradient(circle at 82% 78%, rgba(122, 167, 255, 0.12), transparent 36%),
        linear-gradient(135deg, #050b14, #07111f 58%, #030711);
    }

    .thanks-page {
      min-height: 100vh;
      position: relative;
      display: grid;
      place-items: center;
      padding: 48px 18px;
      z-index: 4;
    }

    .thanks-card {
      width: min(760px, 100%);
      text-align: center;
      border-radius: 34px;
      padding: clamp(30px, 6vw, 54px);
      background:
        radial-gradient(circle at 50% 0%, rgba(124, 242, 255, 0.14), transparent 42%),
        rgba(7, 17, 31, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.13);
      box-shadow: 0 34px 90px rgba(0, 0, 0, 0.38);
      backdrop-filter: blur(20px);
    }

    .thanks-logo {
      width: 72px;
      height: 72px;
      display: block;
      margin: 0 auto 22px;
      border-radius: 24px;
      object-fit: cover;
      box-shadow: 0 0 46px rgba(124, 242, 255, 0.2);
    }

    .thanks-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #7cf2ff;
      background: rgba(124, 242, 255, 0.09);
      border: 1px solid rgba(124, 242, 255, 0.22);
      border-radius: 999px;
      padding: 9px 13px;
      font-size: 12px;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .thanks-card h1 {
      margin: 22px auto 16px;
      max-width: 680px;
      color: #ffffff;
      font-size: clamp(42px, 7vw, 72px);
      line-height: 0.96;
      letter-spacing: -0.075em;
    }

    .thanks-card p {
      max-width: 560px;
      margin: 0 auto;
      color: rgba(235, 245, 255, 0.74);
      font-size: 17px;
      line-height: 1.8;
    }

    .thanks-actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 30px;
    }

    .thanks-note {
      margin-top: 24px;
      color: rgba(235, 245, 255, 0.52);
      font-size: 13px;
      line-height: 1.6;
    }

    @media (max-width: 560px) {
      .thanks-page {
        place-items: start center;
        padding-top: 54px;
      }

      .thanks-card {
        border-radius: 26px;
      }

      .thanks-card h1 {
        font-size: 42px;
      }

      .thanks-actions .btn {
        width: 100%;
      }
    }
  </style>
</head>

<body class="public-page">
  <div class="noise"></div>

  <main class="thanks-page">
    <section class="thanks-card">
      <img class="thanks-logo" src="/logo-icon.svg" alt="Olympion logosu" />

      <div class="thanks-badge">Başvuru alındı</div>

      <h1>Mentörlük başvurun bize ulaştı.</h1>

      <p>
        Başvurunu inceleyip en kısa sürede seninle iletişime geçeceğiz.
        Bu süreçte Olympion’daki planları ve içerikleri inceleyebilirsin.
      </p>

      <div class="thanks-actions">
        <a href="/index.html" class="btn btn-primary">Ana Sayfaya Dön</a>
        <a href="/pricing.html" class="btn btn-secondary">Planları İncele</a>
      </div>

      <div class="thanks-note">
        Olympion Lab • Olimpiyat Öğrenme Platformu
      </div>
    </section>
  </main>

  <script src="/script.js"></script>
</body>
</html>
